---
# MongoDB Secret for credentials
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
type: Opaque
data:
  username: cm9vdA==     # base64 for 'root'
  password: cm9vdA==         # base64 for 'root'
